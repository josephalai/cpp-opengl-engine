# ============================================================
#  animation_demo.cfg  –  Phase 2 Animation & Instancing Demo
#  Place this file in src/Resources/ alongside scene.cfg.
#  Reference it by passing its path to SceneLoader::load()
#  or loading it manually from the demo loop.
# ============================================================
#
# This configuration demonstrates:
#   2.1  Skeletal animation via AnimationLoader (AnimatedModel + AnimationController)
#   2.2  Animation blending: Idle / Walk / Run / Jump state machine
#   2.3  glTF 2.0 model support via GLTFLoader / ModelLoader
#   2.4  Instanced rendering (500+ objects in a single draw call)
#
# ---- Terrain (reuse the main scene terrain) -----------------
terrain heightMap blendMap
terrain_tile  0 -1 primary

# ---- Lights -------------------------------------------------
light directional 0 1000 -7000  0.6 0.6 0.6
light point 100 terrain+10 -50  0.0 0.4 1.0  dist=80

# ---- Animated character (glTF placeholder) ------------------
#
#  Place a glTF 2.0 character file at:
#    src/Resources/Tutorial/Characters/character.glb
#
#  The AnimationController will look for clips named:
#    "Idle", "Walk", "Run", "Jump"
#  If the file is absent, the demo loop falls back to a default
#  cube-with-bones test model.
#
# animated_character  Characters/character.glb  100 3 -50
#   (parsed and used directly in MainGuiLoop — not a SceneLoader keyword)

# ---- Instanced objects: 500 trees ---------------------------
#  These are rendered via InstancedRenderer, NOT the regular entity system.
#  The model + texture are loaded by OBJLoader; transforms are generated
#  procedurally in the demo loop.
#
# instanced_model  tree  tree  500
#   (parsed and used directly in MainGuiLoop — not a SceneLoader keyword)

# ---- Regular scene elements (player, GUI, etc.) -------------
model stall   Stall stallTexture shininess=2 reflectivity=2
model tree    tree  tree         shininess=2 reflectivity=2
player stall  100 3 -50  0 180 0

gui gui/lifebar  -0.72  0.9  0.290 0.0900
gui gui/green    -0.70  0.9  0.185 0.0700
gui gui/heart    -0.90  0.9  0.075 0.0750

text arial  24  -0.95  0.95  "Phase 2 Demo: Animation + Instanced Rendering"
text arial  20  -0.95  0.85  color=0.0,1.0,0.5  "W=Walk  Shift+W=Run  Space=Jump  (none)=Idle"
text arial  18  -0.95  0.75  color=1.0,0.84,0.0  "500 instanced trees rendered in 1 draw call"

water 75 -1 -75
