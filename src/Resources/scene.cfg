# ============================================================
#  scene.cfg  –  Game Scene Configuration
#  Edit this file to change what the engine loads at startup
#  without recompiling. Restart the engine to see changes.
# ============================================================
#
# FORMAT
# ------
#  Lines beginning with '#' and blank lines are ignored.
#  Tokens are separated by whitespace.
#
#  Commands:
#
#  terrain <heightmapFile> <blendmapFile>
#      Names of the heightmap and blendmap images (no extension, .png assumed).
#
#  terrain_tile <gridX> <gridZ> [primary]
#      Add one terrain tile. Mark exactly one with "primary"; it becomes the
#      reference terrain used for height-snapping and lighting.
#
#  light directional <x> <y> <z> <r> <g> <b>
#      Sun-style directional light (no attenuation).
#
#  light point <x> <y|terrain[+offset]> <z> <r> <g> <b> [dist=<N>]
#      Point light. Use "terrain" (or "terrain+10") for y to place it above
#      the terrain surface. dist= controls attenuation falloff distance.
#
#  model <alias> <objFile> <textureFile> [atlas=N] [transparent]
#        [fakeLighting] [shininess=F] [reflectivity=F]
#      Load a 3-D model and give it a short alias used by entity/player/random.
#
#  entity <alias> <x> <y|terrain> <z> [rx ry rz] [scale=F]
#      Place a single entity at the given position.
#      Use "terrain" for y to snap to terrain height at (x, z).
#
#  random <alias> <count> [scaleMin] [scaleMax] [atlas]
#      Spawn <count> randomly-placed copies of a model.
#      "atlas" picks a random atlas-row index for each copy.
#
#  player <alias> <x> <y> <z> [rx ry rz] [scale=F]
#      Create the player entity at the given position.
#
#  assimp <path> [random[+yOffset]|<x> <y> <z>] [scaleMin=F scaleMax=F]
#      Load an Assimp (glTF / OBJ) model. Use "random" to place it at a
#      random terrain position.
#
#  gui <textureFile> <x> <y> <w> <h>
#      Add a HUD/GUI texture overlay (position and size in NDC, -1..+1).
#
#  text <font> <size> <x> <y> [maxWidth=F] [color=R,G,B] [centered] "message"
#      Render a text overlay using the named FreeType font.
#      font     — font name; file must exist at src/Resources/Tutorial/Fonts/<name>.ttf
#      size     — FreeType pixel size (e.g. 24, 36, 48)
#      x, y     — NDC position (-1..+1) for the top-left of the text block
#      maxWidth — optional; max line width as fraction of screen width (default 1.0)
#      color    — optional; float RGB in 0..1 (e.g. color=1.0,0.84,0.0 for gold)
#      centered — optional keyword; centers text within maxWidth
#      "message"— the text content; must be quoted to support spaces
#
#  animated_character <path> <x> <y|terrain[+offset]> <z> [scale=F]
#      Load a glTF 2.0 / FBX skeletal-animation model.
#      path  — file path relative to src/Resources/Tutorial/ (incl. extension, e.g. Characters/character.glb)
#      x y z — world position (y supports "terrain" or "terrain+3" height-snapping)
#      scale — optional uniform scale factor (default 1.0)
#      Multiple animated_character lines are supported; each loads a separate model.
#      Animation clips are registered by name; the well-known names "Idle", "Walk",
#      "Run", and "Jump" are recognized case-insensitively (so "idle" works too).
#
#  water <x> <height> <z>
#      Add one water tile centred at (x, height, z).
#      Each tile covers a 60×60 unit quad at the given y height.
# ============================================================

# ------------------------------------------------------------------
# Terrain  (demonstrates normal-mapped terrain)
# ------------------------------------------------------------------
terrain heightMap blendMap

terrain_tile  0 -1 primary
terrain_tile -1 -1
terrain_tile  0  0
terrain_tile -1  0

# ------------------------------------------------------------------
# Lights  (directional sun for shadow casting + coloured point lights)
# ------------------------------------------------------------------
# Directional sun light — drives shadow map
light directional 0 1000 -7000  0.4 0.4 0.4

# Three coloured point lights near the lamps (demonstrate fog/attenuation)
light point 120 terrain+10  -50   0.0 0.0 2.0  dist=65
light point 100 terrain+10  -50   2.0 0.0 0.0  dist=65
light point 110 terrain+10  -20   0.0 2.0 0.0  dist=65

# ------------------------------------------------------------------
# Models  (alias  objFile  textureFile  [options])
# ------------------------------------------------------------------
model lamp        lamp        lamp
model fern        fern        fern         atlas=2
model grass       grassModel  grassTexture transparent fakeLighting
model stall       Stall       stallTexture shininess=2 reflectivity=2
model tree        tree        tree         shininess=2 reflectivity=2
model fluffytree  fluffy-tree tree         shininess=2 reflectivity=2

# ------------------------------------------------------------------
# Fixed entities  (demonstrates scene graph hierarchy and shadow casting)
# ------------------------------------------------------------------
entity lamp    120 terrain  -50
entity stall     1 0        -82.4  0 180 0
entity lamp    100 terrain  -50
entity lamp    110 terrain  -20

# ------------------------------------------------------------------
# Random spawns  (fill scene to stress-test fog/shadow rendering)
# ------------------------------------------------------------------
random grass      500  0.5  1.5
random fluffytree 500  0.5  1.5
random tree       500  0.25 1.5
random fern       500  0.25 1.5  atlas

# ------------------------------------------------------------------
# Player  (alias  x  y  z  [rx ry rz]  [scale=F])
# ------------------------------------------------------------------
player stall  100 3 -50  0 180 0

# ------------------------------------------------------------------
# Assimp scenes  (demonstrates PBR materials via AssimpStaticShader)
# ------------------------------------------------------------------
assimp Backpack/backpack  random+3  3.25 10.5

# ------------------------------------------------------------------
# Animated characters  (glTF 2.0 skeletal animation)
# Place a .glb file at src/Resources/Tutorial/Characters/ to enable.
# ------------------------------------------------------------------
# animated_character Characters/character.glb  100 terrain -50  scale=1.0

# ------------------------------------------------------------------
# GUI textures  (HUD overlay)
# ------------------------------------------------------------------
gui gui/lifebar  -0.72  0.9  0.290 0.0900
gui gui/green    -0.70  0.9  0.185 0.0700
gui gui/heart    -0.90  0.9  0.075 0.0750

# ------------------------------------------------------------------
# Text overlays  (font  size  x  y  [options]  "message")
#   x / y are in NDC: (-1,-1) = bottom-left, (+1,+1) = top-right.
#   Font files must be present in src/Resources/Tutorial/Fonts/.
#   Static text only: update this file and restart to change content.
# ------------------------------------------------------------------
text arial  24  -0.95  0.95  "Score: 0"
text arial  20  -0.95  0.85  color=1.0,0.84,0.0  "Collect all coins to win!"
text noodle 36  -0.95  0.72  color=1.0,1.0,1.0  maxWidth=0.5  "Gold Rush"

# ------------------------------------------------------------------
# Water tiles  (centerX  height  centerZ)
#   Placed at sea level (-1) across the four-tile terrain grid.
#   Each WaterTile covers a 60×60 area; tiles are spaced 60 units
#   apart to form a continuous water plane.
# ------------------------------------------------------------------
water   75 -1  -75
water  135 -1  -75
water  195 -1  -75
water   75 -1 -135
water  135 -1 -135
water  195 -1 -135
water   75 -1 -195
water  135 -1 -195
water  195 -1 -195
