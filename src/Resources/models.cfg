# ============================================================
#  models.cfg — Model Registry for remote entity spawning
#  Maps model-type keys (sent in SpawnPacket) to loading instructions.
#
#  Format (one entry per line, '#' lines and blank lines are ignored):
#  key | loader_type | asset_path | texture | scale | rot_x,rot_y,rot_z | offset_x,offset_y,offset_z
#
#  key         — model-type string used in SpawnPacket.modelType
#  loader_type — "animated" (glTF/FBX skeletal) or "obj" (static OBJ mesh)
#  asset_path  — for animated: path relative to src/Resources/Tutorial/
#                for obj: OBJ model name (passed to OBJLoader::loadObjModel)
#  texture     — texture name for OBJ models; use "-" for animated models
#  scale       — uniform scale factor (default 1.0)
#  rot_*       — Euler rotation in degrees baked into model space (e.g. -90,0,0
#                stands up Blender GLB exports that load face-down)
#  offset_*    — visual-only world-space offset (shifts mesh relative to physics
#                capsule without moving the physics body)
# ============================================================

# Remote player character (animated glTF skeletal mesh)
player       | animated | Characters/characters.glb | -    | 1.0 | -90,0,0 | 0,1.445,0

# NPC wanderer (same character rig as player)
npc_wanderer | animated | Characters/characters.glb | -    | 1.0 | -90,0,0 | 0,1.445,0

# NPC guard placeholder (static lamp OBJ mesh)
npc_guard    | obj      | lamp                      | lamp | 1.0 | 0,0,0   | 0,0,0
